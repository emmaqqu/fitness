{% extends 'base.html' %}
{% block title %}Personal Info | FitQuest{% endblock %}
{% block content %}
<section class="panel p-4">
  <h1 class="h4 mb-3">Personal Account Details</h1>
  <form method="post" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Username</label>
      <input class="form-control" value="{{ user.username }}" disabled>
    </div>
    <div class="col-md-6">
      <label class="form-label">Date Joined</label>
      <input class="form-control" value="{{ user.date_joined }}" disabled>
    </div>
    <div class="col-md-6">
      <label class="form-label" for="email">Email</label>
      <input id="email" class="form-control" type="email" name="email" value="{{ user.email or '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label" for="phone_num">Phone Number</label>
      <input id="phone_num" class="form-control" name="phone_num" value="{{ user.phone_num or '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label" for="first_name">First Name</label>
      <input id="first_name" class="form-control" name="first_name" value="{{ user.first_name or '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label" for="last_name">Last Name</label>
      <input id="last_name" class="form-control" name="last_name" value="{{ user.last_name or '' }}">
    </div>
    <div class="col-12">
      <button class="btn btn-primary" type="submit">Save Details</button>
    </div>
  </form>
</section>
{% endblock %}
